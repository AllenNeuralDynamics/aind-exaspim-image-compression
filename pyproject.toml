[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "aind-exaspim-image-compression"
description = "Generated from aind-library-template"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "Allen Institute for Neural Dynamics"}
]
classifiers = [
    "Programming Language :: Python :: 3"
]
readme = "README.md"
version = "0.0.0"

dependencies = [
    'bm4d',
    'boto3',
    'cloud-volume[crackle,seg-codecs]',
    'fastremap',
    'gcsfs',
    'google-cloud-storage',
    'imagecodecs',
    'interrogate',
    'matplotlib',
    'ome-zarr>=0.12.0',
    'pandas',
    's3fs==2025.7.0',
    'scikit-image',
    'scikit-learn',
    'scipy',
    'tensorboard',
    'tensorstore',
    'torch',
    'torchvision',
    'tqdm',
    'xarray_multiscale==1.2.0',
    'zarr>=3.0.8',
    "aind-exaspim-dataset-utils @ git+https://github.com/AllenNeuralDynamics/aind-exaspim-dataset-utils.git@main"
]

[project.optional-dependencies]
dev = [
    'black',
    'coverage',
    'flake8',
    'interrogate',
    'isort',
    'Sphinx',
    'furo'
]

[dependency-groups]
dev = [
    "interrogate>=1.7.0,<2.0.0",
    "pytest-cov>=7.1.0,<8.0.0",
    "ruff>=0.15.20,<1.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 79
target_version = ['py311']
exclude = '''

(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | build
    | dist
  )/
  | .gitignore
)
'''

[tool.coverage.run]
omit = ["*__init__*"]
source = ["aind_exaspim_image_compression", "tests"]

[tool.coverage.report]
exclude_lines = [
    "if __name__ == .__main__.:",
    "^from .* import .*",
    "^import .*",
    "pragma: no cover"
]
fail_under = 100

[tool.pytest.ini_options]
addopts = [
    "--cov=src",
    "--cov-report=term-missing",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.isort]
line_length = 79
profile = "black"

[tool.interrogate]
exclude = ["setup.py", "docs", "build"]
fail-under = 100
